<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BeanyBundle</title>
<meta name="description" content="BeanyBundle — a bundle of terminal-styled desktop apps by Greenythebeany.">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="/assets/icons/favicon-192.png">
<link rel="apple-touch-icon" href="/assets/icons/favicon-192.png">
<script>
  // GitHub Pages SPA redirect trick (https://github.com/rafgraph/spa-github-pages):
  // 404.html bounces deep links here encoded in the query string; decode that
  // back into a real pathname before React Router ever sees the URL.
  (function (l) {
    if (l.search[1] === '/') {
      var decoded = l.search.slice(1).split('&').map(function (s) {
        return s.replace(/~and~/g, '&');
      }).join('?');
      window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
    }
  })(window.location);
  if (localStorage.getItem('beanybundle-theme') === 'light') document.documentElement.setAttribute('data-theme', 'light');
</script>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.jsx"></script>
</body>
</html>
